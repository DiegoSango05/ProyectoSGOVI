<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Lista de Contratos</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Gestión de Contratos</h1>
  <a href="/activity/list" class="btn btn-outline-primary">Ver Actividades</a>
</div>

<table class="table table-striped table-hover shadow-sm">
  <thead class="table-dark">
  <tr>
    <th>ID</th>
    <th>Fecha Inicio</th>
    <th>Fecha Fin</th>
    <th>ID Negociación</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="con : ${contracts}">
    <td th:text="${con.id}"></td>
    <td th:text="${con.startDate}"></td>
    <td th:text="${con.endDate}"></td>
    <td th:text="${con.idNegotiation}"></td>
  </tr>
  </tbody>
</table>

<div th:if="${#lists.isEmpty(contracts)}" class="alert alert-info">
  No hay contratos registrados actualmente.
</div>
</body>
</html>
