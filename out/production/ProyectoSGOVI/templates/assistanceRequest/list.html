<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Solicitudes de Asistencia</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h1>Solicitudes de Asistencia (AssistanceRequest)</h1>
<table class="table table-striped table-hover mt-4">
  <thead class="table-primary">
  <tr>
    <th>ID</th>
    <th>DNI Usuario</th>
    <th>Descripción</th>
    <th>Estado</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="request : ${assistanceRequests}">
    <td th:text="${request.id}"></td>
    <td th:text="${request.dniUser}"></td>
    <td th:text="${request.description}"></td>
    <td th:text="${request.status}"></td>
  </tr>
  </tbody>
</table>
<div th:if="${#lists.isEmpty(assistanceRequests)}" class="alert alert-info">
  No hay solicitudes registradas en AssistanceRequest.
</div>
</body>
</html>
