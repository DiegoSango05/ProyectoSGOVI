<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Comunicaciones</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Buzón de Comunicaciones</h1>
    <a href="/activity/list" class="btn btn-outline-primary">Ver Actividades</a>
</div>

<table class="table table-striped table-bordered shadow-sm">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Negociación</th>
        <th>Remitente</th>
        <th>Mensaje</th>
        <th>Fecha</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="comm : ${communications}">
        <td th:text="${comm.id}"></td>
        <td th:text="${comm.idNegotiation}"></td>
        <td th:text="${comm.sender}"></td>
        <td th:text="${comm.message}"></td>
        <td th:text="${comm.messageDate}"></td>
    </tr>
    </tbody>
</table>

<div th:if="${#lists.isEmpty(communications)}" class="alert alert-info">
    No hay mensajes registrados.
</div>
</body>
</html>
