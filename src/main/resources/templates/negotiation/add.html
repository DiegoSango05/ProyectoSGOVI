<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SPS - Nueva Negociación</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <div class="card-header bg-secondary text-white">
                    <h3 class="mb-0">Iniciar Negociación</h3>
                </div>
                <div class="card-body p-4">
                    <form action="#" th:action="@{/negotiation/add}" th:object="${negotiation}" method="post">

                        <!-- Fecha de Negociación -->
                        <div class="mb-3">
                            <label for="negotiationDate" class="form-label">Fecha de Inicio</label>
                            <input type="date" th:field="*{negotiationDate}" class="form-control" id="negotiationDate" required />
                        </div>

                        <!-- Estado -->
                        <div class="mb-3">
                            <label for="status" class="form-label">Estado Inicial</label>
                            <select th:field="*{status}" class="form-select" id="status">
                                <option value="Accepted">Aceptada</option>
                                <option value="Pending">Pendiente</option>
                                <option value="Rejected">Rechazada</option>
                            </select>
                        </div>

                        <!-- ID de la Solicitud (Foreign Key) -->
                        <div class="mb-3">
                            <label for="idRequest" class="form-label">ID de la Solicitud de Asistencia</label>
                            <input type="number" th:field="*{idRequest}" class="form-control" id="idRequest" required />
                            <div class="form-text">Debe ser un ID de solicitud válido.</div>
                        </div>

                        <!-- DNI del Asistente (Foreign Key) -->
                        <div class="mb-4">
                            <label for="dniAssistant" class="form-label">DNI del Asistente (PAP)</label>
                            <input type="text" th:field="*{dniAssistant}" class="form-control" id="dniAssistant" required />
                        </div>

                        <hr>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="/negotiation/list" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-secondary px-4">Crear Negociación</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
