<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Negociaciones</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Estado de Negociaciones</h1>
    <a href="/" class="btn btn-outline-secondary">Inicio</a>
</div>

<table class="table table-hover shadow-sm">
    <thead class="table-dark">
    <tr>
        <th>ID Negociación</th>
        <th>Estado</th>
        <th>Fecha de Negociación</th>
        <th>ID Solicitud</th>
        <th>DNI Asistente</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="neg : ${negotiations}">
        <td th:text="${neg.idNegotiation}"></td>
        <td th:text="${neg.status}"></td>
        <td th:text="${neg.negotiationDate}"></td>
        <td th:text="${neg.idRequest}"></td>
        <td th:text="${neg.dniAssistant}"></td>
    </tr>
    </tbody>
</table>

<div th:if="${#lists.isEmpty(negotiations)}" class="alert alert-info">
    No hay negociaciones activas en este momento.
</div>
</body>
</html>
