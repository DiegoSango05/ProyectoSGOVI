<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>SgOVI - Modificar Perfil</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --ovi-orange: #854d00;
      --ovi-orange-dark: #6e4000;
      --ovi-soft: #fffcf5;
    }

    body {
      background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 300px);
      font-family: 'Inter', sans-serif;
      padding-bottom: 50px;
    }

    .brand-name { color: var(--ovi-orange); font-weight: 800; letter-spacing: 2px; }

    .btn-outline-custom-nav {
      border: 2px solid #000; border-radius: 8px; padding: 0.5rem 1.5rem;
      text-decoration: none; color: #000; font-weight: 700; transition: all 0.3s ease; display: inline-block;
    }
    .btn-outline-custom-nav:hover { border-color: var(--ovi-orange); color: var(--ovi-orange); }

    .form-container {
      max-width: 850px; margin: 40px auto 0; background-color: #fcfcfc;
      padding: 3rem; border-radius: 16px; border: 1px solid #eee; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .form-section-title {
      font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      border-bottom: 2px solid var(--ovi-orange); display: inline-block; margin-bottom: 25px; padding-bottom: 5px; color: var(--ovi-orange);
    }
    .form-label { font-size: 0.8rem; font-weight: 700; color: #444; text-transform: uppercase; margin-bottom: 8px; }

    .form-control, .form-select {
      background-color: #ffffff; border: 1px solid var(--ovi-orange); color: #000; padding: 10px 12px; border-radius: 8px; font-size: 0.95rem;
    }
    .form-control[readonly] { background-color: #e9ecef; border-color: #ccc; color: #495057; cursor: not-allowed; }

    .btn-save {
      background-color: var(--ovi-orange); color: #fff; border: none; padding: 12px 30px; font-weight: 700; border-radius: 8px; text-transform: uppercase; transition: all 0.2s;
    }
    .btn-save:hover { background-color: var(--ovi-orange-dark); transform: translateY(-1px); }

    .btn-cancel {
      color: #000; text-decoration: none; font-weight: 700; padding: 12px 20px; font-size: 0.85rem; text-transform: uppercase; transition: 0.2s;
    }
    .btn-cancel:hover { color: var(--ovi-orange); }

    .error-text { color: #dc3545; font-size: 0.8rem; margin-top: 5px; font-weight: 600; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg pt-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/admin/index}">
      <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="brand-name">SgOVI</span>
      <a th:href="@{/admin/manage-profiles(type=${type})}" class="btn-outline-custom-nav">VOLVER AL LISTADO</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="form-container">
    <h2 class="form-section-title" th:text="'Modificar ' + (${type == 'usuario'} ? 'Usuario OVI' : 'Asistente PAP')">Modificar Perfil</h2>

    <form th:action="@{/admin/profiles/edit/{t}(t=${type})}" th:object="${perfil}" method="post">

      <!-- DATOS COMUNES -->
      <div class="row">
        <div class="col-md-4 mb-4">
          <label for="dni" class="form-label">DNI (No Editable)</label>
          <input type="text" th:field="*{dni}" class="form-control" id="dni" readonly />
        </div>
        <div class="col-md-8 mb-4">
          <label for="name" class="form-label">Nombre</label>
          <input type="text" th:field="*{name}" class="form-control" id="name" />
          <div class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-4">
          <label for="phoneNumber" class="form-label">Teléfono de Contacto</label>
          <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" />
          <div class="error-text" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
        </div>

        <!-- Dirección si es Usuario -->
        <div class="col-md-6 mb-4" th:if="${type == 'usuario'}">
          <label for="address" class="form-label">Dirección / Domicilio</label>
          <input type="text" th:field="*{address}" class="form-control" id="address" />
          <div class="error-text" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
        </div>

        <!-- Localidad si es Asistente -->
        <div class="col-md-6 mb-4" th:if="${type == 'asistente'}">
          <label for="location" class="form-label">Localidad / Municipio</label>
          <input type="text" th:field="*{location}" class="form-control" id="location" />
          <div class="error-text" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
        </div>
      </div>

      <!-- EXCLUSIVO: USUARIOS OVI -->
      <div class="row" th:if="${type == 'usuario'}">
        <div class="col-md-6 mb-4">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="text" th:field="*{email}" class="form-control" id="email" />
          <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="col-md-6 mb-4">
          <label for="emergencyContact" class="form-label">Contacto de Emergencia</label>
          <input type="text" th:field="*{emergencyContact}" class="form-control" id="emergencyContact" />
          <div class="error-text" th:if="${#fields.hasErrors('emergencyContact')}" th:errors="*{emergencyContact}"></div>
        </div>
      </div>

      <!-- EXCLUSIVO: ASISTENTES PAP -->
      <div class="row" th:if="${type == 'asistente'}">
        <div class="col-md-4 mb-4">
          <label for="assistanceType" class="form-label">Tipo de Apoyo</label>
          <select th:field="*{assistanceType}" id="assistanceType" class="form-select">
            <option value="PAP">PAP (Asistencia Personal)</option>
            <option value="PATI">PATI (Apoyo Tecnológico)</option>
          </select>
        </div>
        <div class="col-md-8 mb-4">
          <label for="professionalTraining" class="form-label">Formación Académica y Certificaciones</label>
          <input type="text" th:field="*{professionalTraining}" class="form-control" id="professionalTraining" />
          <div class="error-text" th:if="${#fields.hasErrors('professionalTraining')}" th:errors="*{professionalTraining}"></div>
        </div>
      </div>

      <div class="d-flex justify-content-end align-items-center border-top pt-4">
        <a th:href="@{/admin/manage-profiles(type=${type})}" class="btn-cancel me-3">CANCELAR</a>
        <button type="submit" class="btn-save shadow-sm">GUARDAR CAMBIOS</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
