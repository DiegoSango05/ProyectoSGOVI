<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Gestión de Asistentes</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ovi-orange: #854d00;
            --ovi-orange-dark: #6e4000;
            --ovi-soft: #fffcf5;
        }

        body {
            background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 300px);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .brand-name { color: var(--ovi-orange); font-weight: 800; letter-spacing: 2px; }

        .hero { border-bottom: 1px solid #eee; padding: 3rem 0 2rem; text-align: center; }
        .hero-title { font-size: 2.6rem; font-weight: 800; }
        .hero-title span { color: var(--ovi-orange); }

        .btn-outline-custom-nav {
            border: 2px solid #000;
            border-radius: 8px;
            padding: 0.5rem 1.5rem;
            text-decoration: none;
            color: #000;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn-outline-custom-nav:hover {
            border-color: var(--ovi-orange);
            color: var(--ovi-orange);
            background-color: transparent;
        }

        /* ESTILOS DE LAS PESTAÑAS (TABS) AL 100% DE ANCHO */
        .custom-tabs {
            border-bottom: 2px solid #eee;
            margin-bottom: 2rem;
            display: flex;
            width: 100%;
        }
        .tab-link {
            border-bottom: 3px solid transparent;
            color: #666;
            font-weight: 700;
            padding: 1rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
            text-decoration: none;
            flex: 1;
            text-align: center;
        }
        .tab-link:hover {
            color: var(--ovi-orange);
            background-color: rgba(133, 77, 0, 0.03);
        }
        .tab-link.active {
            color: var(--ovi-orange);
            border-bottom-color: var(--ovi-orange);
        }

        .assistant-pill {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.2rem;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }

        .assistant-pill:hover {
            border-color: var(--ovi-orange);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .pill-grid {
            display: grid;
            grid-template-columns: 100px 180px 110px 90px 120px 120px 1fr;
            gap: 15px;
            align-items: start;
            flex-grow: 1;
            margin-right: 20px;
        }

        .pill-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--ovi-orange);
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .pill-data {
            font-size: 0.9rem;
            font-weight: 600;
            color: #000;
            display: block;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-ficha {
            border: 2px solid var(--ovi-orange);
            color: var(--ovi-orange);
            border-radius: 20px;
            font-weight: 700;
            padding: 0.4rem 1.2rem;
            transition: 0.3s;
            text-decoration: none;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .btn-ficha:hover {
            background-color: var(--ovi-orange);
            color: white;
        }

        .description-text {
            font-size: 0.8rem;
            color: #666;
            font-style: italic;
            border-left: 2px solid #eee;
            padding-left: 10px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/index}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="brand-name">SgOVI</span>
            <a th:href="@{/admin/index}" class="btn-outline-custom-nav">VOLVER</a>
        </div>
    </div>
</nav>

<header class="hero">
    <div class="container">
        <h1 class="hero-title">Gestión de <span>Asistentes</span></h1>
        <p class="text-muted">Listado completo de profesionales registrados y pendientes de validación.</p>
    </div>
</header>

<main class="container py-5">

    <!-- PESTAÑAS DE FILTRADO SIN JAVASCRIPT -->
    <div class="custom-tabs">
        <a th:href="@{/admin/assistants(status='Pending')}"
           th:classappend="${#strings.equalsIgnoreCase(currentStatus, 'Pending')} ? 'active' : ''" class="tab-link">
            <i class="bi bi-clock-history me-1"></i> Pendientes
        </a>
        <a th:href="@{/admin/assistants(status='Accepted')}"
           th:classappend="${#strings.equalsIgnoreCase(currentStatus, 'Accepted')} ? 'active' : ''" class="tab-link">
            <i class="bi bi-check-circle me-1"></i> Aceptados
        </a>
        <a th:href="@{/admin/assistants(status='Rejected')}"
           th:classappend="${#strings.equalsIgnoreCase(currentStatus, 'Rejected')} ? 'active' : ''" class="tab-link">
            <i class="bi bi-x-circle me-1"></i> Rechazados
        </a>
    </div>

    <!-- CONTENEDOR DE FILAS -->
    <div id="assistants-container">
        <div th:each="asistente : ${assistants}" class="assistant-row">
            <div class="assistant-pill">
                <div class="pill-grid">
                    <div><span class="pill-label">DNI</span><span class="pill-data" th:text="${asistente.dni}">12345678Z</span></div>
                    <div><span class="pill-label">Nombre</span><span class="pill-data" th:text="${asistente.name}">Nombre</span></div>
                    <div><span class="pill-label">Teléfono</span><span class="pill-data" th:text="${asistente.phoneNumber}">600123123</span></div>
                    <div><span class="pill-label">Tipo</span><span class="pill-data" th:text="${asistente.assistanceType}">PAP</span></div>
                    <div><span class="pill-label">Localidad</span><span class="pill-data" th:text="${asistente.location}">Castellón</span></div>
                    <div>
                        <span class="pill-label">Estado</span>
                        <span th:class="${#strings.equalsIgnoreCase(asistente.status, 'Pending') ? 'status-badge bg-warning text-dark' :
                                      (#strings.equalsIgnoreCase(asistente.status, 'Accepted') ? 'status-badge bg-success text-white' : 'status-badge bg-danger text-white')}"
                              th:text="${asistente.status}">Pending</span>
                    </div>
                    <div class="description-text">
                        <span class="pill-label">Formación</span>
                        <span th:text="${#strings.abbreviate(asistente.professionalTraining, 25)}">Detalles...</span>
                    </div>
                </div>

                <div>
                    <a th:href="@{/admin/assistants/details/{dni}(dni=${asistente.dni})}" class="btn-ficha">VER FICHA</a>
                </div>
            </div>
        </div>

        <!-- Mensaje si la lista viene vacía desde el servidor -->
        <div th:if="${#lists.isEmpty(assistants)}" class="text-center text-muted py-5">
            <i class="bi bi-person-badge mb-2 d-block fs-1"></i>
            No hay asistentes en esta sección.
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
