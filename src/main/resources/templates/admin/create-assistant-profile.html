<!DOCTYPE html>
<html html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>SgOVI - Registro de Asistente PAP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --ovi-orange: #854d00;
            --ovi-orange-dark: #6e4000;
            --ovi-soft: #fffcf5;
        }
        body { background-color: #ffffff; color: #000000; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        .header-brand { text-align: center; padding: 30px 0; background-color: #ffffff; }
        .brand-logo { max-width: 150px; margin-bottom: 15px; transition: transform 0.2s; }
        .brand-logo:hover { transform: scale(1.05); }
        .brand-title { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
        .brand-subtitle { font-size: 0.85rem; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .form-container { max-width: 900px; margin: 0 auto; background-color: #fcfcfc; padding: 3rem; border-radius: 16px; border: 1px solid #eee; }
        .form-section-title { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--ovi-orange); display: inline-block; margin-bottom: 25px; padding-bottom: 5px; color: #000000; }
        .form-label { font-size: 0.8rem; font-weight: 700; color: #444; text-transform: uppercase; margin-bottom: 8px; }
        .form-control, .form-select { background-color: #ffffff; border: 1px solid var(--ovi-orange); color: #000; padding: 10px 12px; border-radius: 8px; transition: all 0.2s; }
        .form-control:focus, .form-select:focus { border-color: #c48b2d; box-shadow: 0 0 0 0.25rem rgba(218, 159, 56, 0.15); outline: none; }
        .is-invalid { border-color: #dc3545 !important; }
        .error-message { color: #dc3545; font-size: 0.75rem; font-weight: 700; margin-top: 5px; }

        /* CORREGIDO: Animación, sombra de elevación y color de hover idénticos al botón del usuario */
        .btn-save { background-color: var(--ovi-orange); color: #fff; border: none; padding: 12px 30px; font-weight: 700; border-radius: 8px; text-transform: uppercase; transition: all 0.2s; }
        .btn-save:hover { background-color: #c48b2d; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(218, 159, 56, 0.2); }

        .btn-cancel { color: #000; text-decoration: none; font-weight: 700; padding: 12px 20px; font-size: 0.85rem; text-transform: uppercase; transition: color 0.2s ease; }
        .btn-cancel:hover { color: var(--ovi-orange); }
        .input-group-text { background-color: #ffffff; border: 1px solid var(--ovi-orange); border-right: none; border-radius: 8px 0 0 8px; font-weight: 600; }
        .phone-input { border-radius: 0 8px 8px 0 !important; }
    </style>
</head>
<body>

<div class="header-brand">
    <a th:href="@{/admin/index}">
        <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" class="brand-logo">
    </a>
    <h1 class="brand-title">OFICINA VIDA INDEPENDENT</h1>
    <p class="brand-subtitle">SOLE ARNAU RIPOLLÉS</p>
</div>

<div class="container">
    <div class="form-container shadow-sm">
        <h2 class="form-section-title">Registro de Asistente Personal</h2>

        <form th:action="@{/admin/profiles/create/asistente}" th:object="${perfil}" method="post">

            <input type="hidden" th:field="*{status}" />

            <div class="row">
                <div class="col-md-4 mb-4">
                    <label for="dni" class="form-label">DNI / Identificación</label>
                    <input type="text" th:field="*{dni}" class="form-control" th:errorclass="is-invalid" id="dni" placeholder="Ej: 12345678X"/>
                    <div th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" class="error-message"></div>
                </div>
                <div class="col-md-8 mb-4">
                    <label for="name" class="form-label">Nombre Completo</label>
                    <input type="text" th:field="*{name}" class="form-control" th:errorclass="is-invalid" id="name"/>
                    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-message"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label for="birthDate" class="form-label">Fecha de Nacimiento</label>
                    <input type="date" th:field="*{birthDate}" class="form-control" id="birthDate" />
                    <div th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}" class="error-message"></div>
                </div>
                <div class="col-md-6 mb-4">
                    <label for="phoneNumber" class="form-label">Teléfono de Contacto</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <span style="font-size: 1.1rem; margin-right: 5px;">🇪🇸</span> +34
                        </span>
                        <input type="text" th:field="*{phoneNumber}" class="form-control phone-input" id="phoneNumber" />
                    </div>
                    <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="error-message"></div>
                </div>
            </div>

            <div class="row bg-light p-3 rounded mb-4" style="border-left: 4px solid var(--ovi-orange); margin-left: 0; margin-right: 0;">
                <div class="col-md-6 mb-2">
                    <label for="password" class="form-label">Establecer Contraseña</label>
                    <input type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid" id="password" placeholder="Mínimo 6 caracteres"/>
                    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message"></div>
                </div>
                <div class="col-md-6 mb-2">
                    <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                    <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" placeholder="Repite la contraseña"/>
                </div>
                <div class="col-12">
                    <p style="font-size: 0.7rem; color: #444; margin-top: 5px; margin-bottom: 0;">
                        <i class="bi bi-info-circle text-warning"></i> Usarás tu DNI y esta contraseña para acceder al sistema.
                    </p>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <label for="assistanceType" class="form-label">Tipo de Asistencia</label>
                    <select th:field="*{assistanceType}" class="form-select" id="assistanceType">
                        <option value="PAP">PAP (Asistente Personal)</option>
                        <option value="PATI">PATI (Asistente de Transporte)</option>
                    </select>
                </div>
                <div class="col-md-4 mb-4">
                    <label for="previousExperience" class="form-label">¿Experiencia?</label>
                    <select th:field="*{previousExperience}" class="form-select" id="previousExperience">
                        <option th:value="true">Sí, con experiencia</option>
                        <option th:value="false">Sin experiencia previa</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label for="professionalTraining" class="form-label">Formación Profesional y Títulos</label>
                <textarea th:field="*{professionalTraining}" class="form-control" id="professionalTraining" rows="2" placeholder="Describa sus certificaciones..."></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label for="availability" class="form-label">Disponibilidad</label>
                    <input type="text" th:field="*{availability}" class="form-control" th:errorclass="is-invalid" id="availability" placeholder="Ej: Mañanas, Fines de semana..." />
                </div>
                <div class="col-md-6 mb-4">
                    <label for="location" class="form-label">Zona Geográfica</label>
                    <input type="text" th:field="*{location}" class="form-control" th:errorclass="is-invalid" id="location" placeholder="Ej: Castellón, Almazora..." />
                </div>
            </div>

            <div class="d-flex justify-content-end align-items-center border-top pt-4 mt-2">
                <a th:href="@{/admin/manage-profiles(type='asistente')}" class="btn-cancel me-3">CANCELAR</a>
                <button type="submit" class="btn-save shadow-sm">CREAR PERFIL</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
