<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SgOVI - Selección de Registro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .selection-wrapper {
            width: 100%;
            max-width: 700px; /* Más ancho para las dos columnas */
            text-align: center;
            padding: 20px;
        }
        /* CLONES DEL LOGIN PARA QUE NO CAMBIE EL TAMAÑO */
        .brand-logo {
            max-width: 180px; /* Igual que en el Login */
            margin-bottom: 20px;
        }
        .brand-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #000000;
        }
        .brand-subtitle {
            font-size: 0.85rem;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* Tarjetas de selección */
        .option-card {
            background-color: #f8f9fa;
            padding: 2.5rem 1.5rem;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            height: 100%;
        }
        .option-card:hover {
            border-color: #000000;
            background-color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: #444;
            margin-bottom: 20px;
        }
        .option-card:hover .icon-circle {
            border-color: #000000;
            color: #000000;
        }
        .option-title {
            color: #000000;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .option-desc {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .back-link {
            margin-top: 40px;
            display: block;
            color: #000000;
            text-decoration: underline;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="selection-wrapper">
    <!-- Encabezado idéntico al Login -->
    <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" class="brand-logo">
    <h1 class="brand-title">OFICINA VIDA INDEPENDENT</h1>
    <p class="brand-subtitle">SOLE ARNAU RIPOLLÉS</p>

    <div class="row g-4">
        <!-- Usuario OVI -->
        <div class="col-md-6">
            <a th:href="@{/oviuser/add}" class="option-card">
                <div class="icon-circle">U</div>
                <div class="option-title">Usuario OVI</div>
                <p class="option-desc">Persona con necesidad de asistencia personalizada.</p>
            </a>
        </div>

        <!-- Asistente -->
        <div class="col-md-6">
            <a th:href="@{/pap_assistant/add}" class="option-card">
                <div class="icon-circle">A</div>
                <div class="option-title">Asistente Personal</div>
                <p class="option-desc">Profesional PAP / PATI con certificación oficial.</p>
            </a>
        </div>
    </div>

    <a th:href="@{/login}" class="back-link">← Volver al inicio de sesión</a>
</div>

</body>
</html>
