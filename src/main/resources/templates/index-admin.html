<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SgOVI - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --ovi-orange: #da9f38; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .sidebar { background-color: #000; min-height: 100vh; color: #fff; padding-top: 20px; }
        .nav-link { color: #ccc; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--ovi-orange); }
        .admin-header { background: #fff; padding: 20px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 sidebar">
            <h4 class="text-center mb-4">SgOVI Admin</h4>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Solicitudes PAP</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Usuarios OVI</a></li>
                <li class="nav-item"><hr class="bg-secondary"></li>
                <li class="nav-item"><a class="nav-link text-danger" th:href="@{/logout}">Cerrar Sesión</a></li>
            </ul>
        </nav>

        <!-- Contenido Principal -->
        <main class="col-md-10 p-0">
            <header class="admin-header d-flex justify-content-between align-items-center">
                <h2 class="h5 m-0">Panel de Control</h2>
                <span>Bienvenido/a, <strong th:text="${session.user.name}">Nombre</strong></span>
            </header>

            <div class="p-4">
                <div class="alert alert-info border-0 shadow-sm" style="border-left: 5px solid var(--ovi-orange) !important;">
                    Bienvenido al sistema de gestión. Selecciona una opción del menú lateral para comenzar.
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
