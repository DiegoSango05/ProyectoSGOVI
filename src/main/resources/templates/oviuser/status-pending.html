<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SgOVI - Solicitud en Revisión</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .status-wrapper {
            text-align: center;
            max-width: 500px;
            padding: 3.5rem;
            background-color: #f8f9fa;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
        }
        .brand-logo { max-width: 140px; margin-bottom: 25px; }
        .status-badge {
            background-color: #ffc107; /* Amarillo de advertencia/espera */
            color: #000;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .title { font-size: 1.4rem; font-weight: 700; margin-bottom: 15px; }
        .message { color: #555; line-height: 1.6; margin-bottom: 30px; }
        .btn-logout {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            border-radius: 8px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-logout:hover { opacity: 0.8; color: #fff; }
    </style>
</head>
<body>

<div class="status-wrapper shadow-sm">
    <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" class="brand-logo">
    <br>
    <div class="status-badge">Solicitud en revisión</div>

    <h1 class="title">Hola, <span th:text="${session.user.name}">Usuario</span></h1>

    <p class="message">
        Tu perfil ha sido registrado correctamente, pero todavía está **pendiente de validación** por parte del equipo de administración de la OVI.
        <br><br>
        Recibirás una notificación en cuanto tu cuenta sea activada.
    </p>

    <a th:href="@{/logout}" class="btn-logout">CERRAR SESIÓN</a>
</div>

</body>
</html>
