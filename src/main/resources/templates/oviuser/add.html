<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Registro Usuario OVI</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --ovi-orange: #da9f38;
        }
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }
        .header-brand {
            text-align: center;
            padding: 30px 0;
            background-color: #ffffff;
        }
        .brand-logo {
            max-width: 150px;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .brand-logo:hover {
            transform: scale(1.05);
        }
        .brand-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .brand-subtitle {
            font-size: 0.85rem;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .form-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: #fcfcfc;
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid #eee;
        }

        .form-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--ovi-orange); /* Línea naranja */
            display: inline-block;
            margin-bottom: 25px;
            padding-bottom: 5px;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control {
            background-color: #ffffff;
            border: 1px solid var(--ovi-orange); /* Borde naranja por defecto */
            color: #000;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #c48b2d;
            box-shadow: 0 0 0 0.25rem rgba(218, 159, 56, 0.15); /* Resplandor naranja */
            outline: none;
        }

        /* Ajuste para los grupos de input (teléfono) */
        .input-group-text {
            border: 1px solid var(--ovi-orange) !important;
            border-right: none !important;
            background-color: #fff;
        }

        /* Botones */
        .btn-save {
            background-color: var(--ovi-orange);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-save:hover {
            background-color: #c48b2d;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(218, 159, 56, 0.2);
        }
        .btn-cancel {
            color: #666;
            text-decoration: underline;
            font-weight: 600;
            padding: 12px 20px;
            font-size: 0.9rem;
        }
        .btn-cancel:hover {
            color: var(--ovi-orange);
        }

        .error-text {
            color: #dc3545;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="header-brand">
    <a th:href="@{/}">
        <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" class="brand-logo">
    </a>
    <h1 class="brand-title">OFICINA VIDA INDEPENDENT</h1>
    <p class="brand-subtitle">SOLE ARNAU RIPOLLÉS</p>
</div>

<div class="container">
    <div class="form-container shadow-sm">
        <h2 class="form-section-title">Registro de Usuario OVI</h2>

        <form th:action="@{/oviuser/add}" th:object="${oviuser}" method="post">

            <div class="row mt-3">
                <div class="col-md-4 mb-4">
                    <label for="dni" class="form-label">DNI / Identificación</label>
                    <input type="text" th:field="*{dni}" class="form-control" id="dni" placeholder="Ej: 12345678X"/>
                    <div class="error-text" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></div>
                </div>
                <div class="col-md-8 mb-4">
                    <label for="name" class="form-label">Nombre Completo</label>
                    <input type="text" th:field="*{name}" class="form-control" id="name" />
                    <div class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label for="birthDate" class="form-label">Fecha de Nacimiento</label>
                    <input type="date" th:field="*{birthDate}" class="form-control" id="birthDate" />
                </div>
                <div class="col-md-6 mb-4">
                    <label for="phoneNumber" class="form-label">Teléfono de Contacto</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <span style="font-size: 1.1rem; margin-right: 5px;">🇪🇸</span> +34
                        </span>
                        <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" />
                    </div>
                    <div class="error-text" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="ejemplo@correo.com" />
                    <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="col-md-6 mb-4">
                    <label for="emergencyContact" class="form-label">Número de Emergencia (PAP)</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <span style="font-size: 1.1rem; margin-right: 5px;">🇪🇸</span> +34
                        </span>
                        <input type="text" th:field="*{emergencyContact}" class="form-control" id="emergencyContact" />
                    </div>
                    <div class="error-text" th:if="${#fields.hasErrors('emergencyContact')}" th:errors="*{emergencyContact}"></div>
                </div>
            </div>

            <div class="mb-4">
                <label for="address" class="form-label">Dirección de Residencia</label>
                <input type="text" th:field="*{address}" class="form-control" id="address" placeholder="Calle, Número, Piso, Ciudad" />
            </div>

            <div class="mb-5">
                <label for="document" class="form-label">Documentación Adjunta</label>
                <input type="text" th:field="*{document}" class="form-control" id="document" placeholder="Nombre del archivo o enlace" />
            </div>

            <div class="d-flex justify-content-end align-items-center border-top pt-4">
                <a th:href="@{/choose-registration}" class="btn-cancel me-3">Cancelar</a>
                <button type="submit" class="btn-save shadow-sm">Registrarse</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
