<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SPS - Registro de Usuario OVI</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Nuevo Perfil de Usuario OVI</h3>
                </div>
                <div class="card-body p-4">
                    <form action="#" th:action="@{/oviuser/add}" th:object="${oviuser}" method="post">

                        <div class="row">
                            <!-- DNI -->
                            <div class="col-md-4 mb-3">
                                <label for="dni" class="form-label">DNI</label>
                                <input type="text" th:field="*{dni}" class="form-control" id="dni" required />
                            </div>
                            <!-- Nombre Completo -->
                            <div class="col-md-8 mb-3">
                                <label for="name" class="form-label">Nombre Completo</label>
                                <input type="text" th:field="*{name}" class="form-control" id="name" required />
                            </div>
                        </div>

                        <div class="row">
                            <!-- Fecha Nacimiento -->
                            <div class="col-md-6 mb-3">
                                <label for="birthDate" class="form-label">Fecha de Nacimiento</label>
                                <input type="date" th:field="*{birthDate}" class="form-control" id="birthDate" />
                            </div>
                            <!-- Teléfono -->
                            <div class="col-md-6 mb-3">
                                <label for="phoneNumber" class="form-label">Teléfono</label>
                                <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" />
                            </div>
                        </div>

                        <div class="row">
                            <!-- Email -->
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="ejemplo@correo.com" />
                            </div>
                            <!-- Contacto de Emergencia -->
                            <div class="col-md-6 mb-3">
                                <label for="emergencyContact" class="form-label">Número de Emergencia</label>
                                <input type="text" th:field="*{emergencyContact}" class="form-control" id="emergencyContact" />
                            </div>
                        </div>

                        <!-- Dirección -->
                        <div class="mb-3">
                            <label for="address" class="form-label">Dirección</label>
                            <input type="text" th:field="*{address}" class="form-control" id="address" />
                        </div>

                        <!-- Documento (Referencia) -->
                        <div class="mb-4">
                            <label for="document" class="form-label">Documentación Adjunta (Nombre/Link)</label>
                            <input type="text" th:field="*{document}" class="form-control" id="document" placeholder="Ej: certificado_discapacidad.pdf" />
                        </div>

                        <hr>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="/oviuser/list" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-4">Dar de Alta Usuario</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
