<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Chats</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ovi-orange: #854d00;
            --ovi-soft: #fffcf5;
        }

        body {
            background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 280px);
            color: #000;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .brand-name {
            color: var(--ovi-orange);
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .page-header {
            border-bottom: 1px solid #eee;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
        }

        .page-title span {
            color: var(--ovi-orange);
        }

        .option-card {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            color: #000;
            display: block;
            height: 100%;
            padding: 2rem;
            text-decoration: none;
            transition: 0.2s;
        }

        .option-card:hover {
            border-color: var(--ovi-orange);
            color: #000;
            transform: translateY(-3px);
        }

        .option-card.disabled {
            cursor: default;
            opacity: 0.65;
            pointer-events: none;
        }

        .option-icon {
            align-items: center;
            background-color: var(--ovi-orange);
            border-radius: 12px;
            color: #fff;
            display: inline-flex;
            font-size: 1.6rem;
            height: 56px;
            justify-content: center;
            margin-bottom: 1.2rem;
            width: 56px;
        }

        .option-card h2 {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .option-card p {
            color: #666;
            margin-bottom: 0;
        }

        .btn-outline-custom {
            border: 2px solid #000;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            padding: 0.58rem 1rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-outline-custom:hover {
            border-color: var(--ovi-orange);
            color: var(--ovi-orange);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/oviuser}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span class="brand-name">SgOVI</span>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="page-header d-flex flex-column flex-lg-row justify-content-between gap-3">
        <div>
            <h1 class="page-title">Tus <span>chats</span></h1>
            <p class="text-muted mb-0">Acceso para <span th:text="${oviuser.name}">tu usuario</span>.</p>
        </div>
        <a th:href="@{/oviuser/index}" class="btn-outline-custom align-self-start">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <a th:href="@{/assistancerequest/my-list}" class="option-card">
                <span class="option-icon"><i class="bi bi-plus-lg"></i></span>
                <h2>Nuevo chat</h2>
                <p>Elige una solicitud aceptada y contacta con un asistente.</p>
            </a>
        </div>
        <div class="col-md-6">
            <a th:href="@{/communication/list}" class="option-card">
                <span class="option-icon"><i class="bi bi-chat-left-text"></i></span>
                <h2>Chats existentes</h2>
                <p>Ver los chats ya existentes.</p>
            </a>
        </div>
    </div>
</main>
</body>
</html>
