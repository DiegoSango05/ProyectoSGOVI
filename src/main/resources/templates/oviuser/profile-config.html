<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Configuracion perfil</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ovi-orange: #854d00;
            --ovi-orange-dark: #6e4000;
            --ovi-soft: #fffcf5;
        }

        body {
            background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 280px);
            color: #000;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .brand-name {
            color: var(--ovi-orange);
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .page-header {
            border-bottom: 1px solid #eee;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
        }

        .page-title span {
            color: var(--ovi-orange);
        }

        .form-panel {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-left: 6px solid var(--ovi-orange);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
        }

        .form-label {
            color: #555;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0.72rem 0.85rem;
        }

        .form-control:focus {
            border-color: var(--ovi-orange);
            box-shadow: 0 0 0 0.2rem rgba(218, 159, 56, 0.18);
        }

        .error-text {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 0.35rem;
        }

        .btn-main {
            background-color: var(--ovi-orange);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            padding: 0.7rem 1.1rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-main:hover {
            background-color: var(--ovi-orange-dark);
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-outline-custom {
            background-color: transparent;
            border: 2px solid #000;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            padding: 0.58rem 1rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-outline-custom:hover {
            border-color: var(--ovi-orange);
            color: var(--ovi-orange);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/oviuser}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span class="brand-name">SgOVI</span>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="page-header d-flex flex-column flex-lg-row justify-content-between gap-3">
        <div>
            <h1 class="page-title">Configuracion <span>perfil</span></h1>
            <p class="text-muted mb-0">Modifica tus datos personales y de contacto.</p>
        </div>
        <a th:href="@{/oviuser/profile}" class="btn-outline-custom align-self-start">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>

    <section class="form-panel">
        <form action="#" th:action="@{/oviuser/profile/config}" th:object="${oviuser}" method="post">
            <input type="hidden" th:field="*{dni}" />

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="dniReadonly" class="form-label">DNI</label>
                    <input type="text" class="form-control" id="dniReadonly" th:value="${oviuser.dni}" readonly />
                </div>

                <div class="col-md-6">
                    <label for="name" class="form-label">Nombre</label>
                    <input type="text" th:field="*{name}" class="form-control" id="name" />
                    <div class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="col-md-6">
                    <label for="birthDate" class="form-label">Fecha de nacimiento</label>
                    <input type="date" th:field="*{birthDate}" class="form-control" id="birthDate" />
                    <div class="error-text" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" id="email" />
                    <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="col-md-6">
                    <label for="phoneNumber" class="form-label">Telefono</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" />
                    <div class="error-text" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                </div>

                <div class="col-md-6">
                    <label for="emergencyContact" class="form-label">Contacto de emergencia</label>
                    <input type="text" th:field="*{emergencyContact}" class="form-control" id="emergencyContact" />
                    <div class="error-text" th:if="${#fields.hasErrors('emergencyContact')}" th:errors="*{emergencyContact}"></div>
                </div>

                <div class="col-md-6">
                    <label for="document" class="form-label">Documento</label>
                    <input type="text" th:field="*{document}" class="form-control" id="document" />
                    <div class="error-text" th:if="${#fields.hasErrors('document')}" th:errors="*{document}"></div>
                </div>

                <div class="col-md-6">
                    <label for="password" class="form-label">Contrasena</label>
                    <input type="password" th:field="*{password}" class="form-control" id="password" />
                    <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="col-12">
                    <label for="address" class="form-label">Direccion</label>
                    <input type="text" th:field="*{address}" class="form-control" id="address" />
                    <div class="error-text" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                </div>
            </div>

            <div class="border-top mt-4 pt-4 d-flex flex-column flex-md-row justify-content-end gap-2">
                <a th:href="@{/oviuser/profile}" class="btn-outline-custom">
                    Cancelar
                </a>
                <button type="submit" class="btn-main">
                    <i class="bi bi-check2 me-1"></i> Guardar cambios
                </button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
