    <!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Acceso</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ovi-orange: #854d00;
            --ovi-orange-dark: #6e4000;
            --ovi-soft: #fffcf5;
        }
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }
        .brand-logo {
            max-width: 180px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .brand-logo:hover {
            transform: scale(1.02);
        }
        .brand-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #000000;
        }
        .brand-subtitle {
            font-size: 0.85rem;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        .login-card {
            background-color: #fcfcfc;
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid #eee;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .form-label {
            display: block;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 700;
            color: #444;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-control {
            background-color: #ffffff;
            border: 1px solid #ced4da;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-control:focus {
            background-color: #ffffff;
            border-color: var(--ovi-orange);
            color: #000;
            box-shadow: 0 0 0 0.25rem rgba(218, 159, 56, 0.1);
            outline: none;
        }
        .btn-submit {
            background-color: var(--ovi-orange);
            color: #ffffff;
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-submit:hover {
            background-color: #c48b2d;
            transform: translateY(-1px);
        }

        /* Footer de Navegación Unificado */
        .login-footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .footer-link {
            color: #000;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        .footer-link i {
            margin-right: 5px;
        }
        .footer-link:hover {
            color: var(--ovi-orange);
            text-decoration: underline;
        }
        .divider {
            color: #000000;
            font-weight: 300;
        }
        .text-register-hint {
            color: #777;
            font-size: 0.8rem;
            margin-top: 25px;
            margin-bottom: -15px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <a th:href="@{/}">
        <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" class="brand-logo">
    </a>

    <h1 class="brand-title">OFICINA VIDA INDEPENDENT</h1>
    <p class="brand-subtitle">SOLE ARNAU RIPOLLÉS</p>

    <div class="login-card">
        <form th:action="@{/login}" th:object="${user}" method="post">

            <div class="mb-3">
                <label for="username" class="form-label">DNI / Usuario</label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Introduce tu DNI" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">ACCEDER</button>
        </form>
    </div>

    <div class="login-footer">
        <a th:href="@{/}" class="footer-link">
            <i class="bi bi-house"></i> Ir a Inicio
        </a>
        <span class="divider">|</span>
        <a th:href="@{/choose-registration}" class="footer-link">
            Regístrate ahora
        </a>
    </div>
</div>

</body>
</html>
