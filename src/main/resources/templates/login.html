<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Acceso</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --ovi-orange: #da9f38;
        }
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .brand-logo {
            max-width: 180px;
            margin-bottom: 20px;
        }
        .brand-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #000000; /* Vuelve a Negro */
        }
        .brand-subtitle {
            font-size: 0.85rem;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        .login-card {
            background-color: #fcfcfc;
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid #eee;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .form-label {
            display: block;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 700;
            color: #444;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-control {
            background-color: #ffffff;
            border: 1px solid #ced4da;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-control:focus {
            background-color: #ffffff;
            border-color: var(--ovi-orange);
            color: #000;
            box-shadow: 0 0 0 0.25rem rgba(218, 159, 56, 0.1);
        }
        .btn-submit {
            background-color: var(--ovi-orange); /* Se mantiene Naranja */
            color: #ffffff;
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-submit:hover {
            background-color: #c48b2d;
            transform: translateY(-1px);
        }
        .footer-links {
            margin-top: 30px;
            font-size: 0.9rem;
        }
        .footer-links a {
            color: #000000; /* Vuelve a Negro */
            text-decoration: underline; /* Subrayado para indicar que es link */
            font-weight: 700;
        }
        .footer-links a:hover {
            color: var(--ovi-orange); /* Solo cambia a naranja al pasar el ratón */
        }
        .text-muted-small {
            color: #777;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo Oficina Vida Independent" class="brand-logo">

    <h1 class="brand-title">OFICINA VIDA INDEPENDENT</h1>
    <p class="brand-subtitle">SOLE ARNAU RIPOLLÉS</p>

    <div class="login-card">
        <form th:action="@{/login}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label">DNI / Usuario</label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Introduce tu DNI" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">ACCEDER</button>
        </form>
    </div>

    <div class="footer-links">
        <p class="text-muted-small mb-1">¿No tienes cuenta aún?</p>
        <a th:href="@{/choose-registration}">Regístrate ahora en SgOVI</a>
    </div>
</div>

</body>
</html>
