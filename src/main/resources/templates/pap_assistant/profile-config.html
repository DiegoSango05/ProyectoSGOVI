<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Configuracion perfil asistente</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --ovi-orange: #854d00; --ovi-orange-dark: #6e4000; --ovi-soft: #fffcf5; }
        body { background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 280px); color: #000; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .brand-name { color: var(--ovi-orange); font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; }
        .page-header { border-bottom: 1px solid #eee; margin-bottom: 2rem; padding-bottom: 1.5rem; }
        .page-title { font-size: 2.2rem; font-weight: 800; margin-bottom: .35rem; }
        .page-title span { color: var(--ovi-orange); }
        .form-panel { background-color: #fcfcfc; border: 1px solid #eee; border-left: 6px solid var(--ovi-orange); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,.05); padding: 1.5rem; }
        .form-label { color: #555; font-size: .78rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
        .form-control, .form-select { border: 1px solid #ddd; border-radius: 8px; padding: .72rem .85rem; }
        .form-control:focus, .form-select:focus { border-color: var(--ovi-orange); box-shadow: 0 0 0 .2rem rgba(218,159,56,.18); }
        .error-text { color: #dc3545; font-size: .85rem; margin-top: .35rem; }
        .btn-main { background-color: var(--ovi-orange); border: none; border-radius: 8px; color: #fff; font-weight: 700; padding: .7rem 1.1rem; text-decoration: none; text-transform: uppercase; transition: .2s; }
        .btn-main:hover { background-color: var(--ovi-orange-dark); color: #fff; transform: translateY(-1px); }
        .btn-outline-custom { background-color: transparent; border: 2px solid #000; border-radius: 8px; color: #000; font-weight: 700; padding: .58rem 1rem; text-decoration: none; text-transform: uppercase; transition: .2s; }
        .btn-outline-custom:hover { border-color: var(--ovi-orange); color: var(--ovi-orange); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/pap_assistant/index}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span class="brand-name">SgOVI</span>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="page-header d-flex flex-column flex-lg-row justify-content-between gap-3">
        <div>
            <h1 class="page-title">Configuracion <span>perfil</span></h1>
            <p class="text-muted mb-0">Modifica tus datos personales y profesionales.</p>
        </div>
        <a th:href="@{/pap_assistant/profile}" class="btn-outline-custom align-self-start">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>

    <section class="form-panel">
        <form action="#" th:action="@{/pap_assistant/profile/config}" th:object="${papassistant}" method="post">
            <input type="hidden" th:field="*{dni}" />

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="dniReadonly" class="form-label">DNI</label>
                    <input type="text" class="form-control" id="dniReadonly" th:value="${papassistant.dni}" readonly />
                </div>
                <div class="col-md-6">
                    <label for="name" class="form-label">Nombre</label>
                    <input type="text" th:field="*{name}" class="form-control" id="name" />
                    <div class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="col-md-6">
                    <label for="birthDate" class="form-label">Fecha de nacimiento</label>
                    <input type="date" th:field="*{birthDate}" class="form-control" id="birthDate" />
                    <div class="error-text" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
                </div>
                <div class="col-md-6">
                    <label for="phoneNumber" class="form-label">Telefono</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" />
                    <div class="error-text" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                </div>
                <div class="col-md-6">
                    <label for="assistanceType" class="form-label">Tipo de asistencia</label>
                    <select th:field="*{assistanceType}" class="form-select" id="assistanceType">
                        <option value="PAP">PAP</option>
                        <option value="PATI">PATI</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="previousExperience" class="form-label">Experiencia previa</label>
                    <select th:field="*{previousExperience}" class="form-select" id="previousExperience">
                        <option th:value="true">Si</option>
                        <option th:value="false">No</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="availability" class="form-label">Disponibilidad</label>
                    <input type="text" th:field="*{availability}" class="form-control" id="availability" />
                    <div class="error-text" th:if="${#fields.hasErrors('availability')}" th:errors="*{availability}"></div>
                </div>
                <div class="col-md-6">
                    <label for="location" class="form-label">Zona geografica</label>
                    <input type="text" th:field="*{location}" class="form-control" id="location" />
                    <div class="error-text" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                </div>
                <div class="col-md-6">
                    <label for="password" class="form-label">Contrasena</label>
                    <input type="password" th:field="*{password}" class="form-control" id="password" />
                    <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="col-12">
                    <label for="professionalTraining" class="form-label">Formacion profesional</label>
                    <textarea th:field="*{professionalTraining}" class="form-control" id="professionalTraining" rows="3"></textarea>
                </div>
            </div>

            <div class="border-top mt-4 pt-4 d-flex flex-column flex-md-row justify-content-end gap-2">
                <a th:href="@{/pap_assistant/profile}" class="btn-outline-custom">Cancelar</a>
                <button type="submit" class="btn-main">
                    <i class="bi bi-check2 me-1"></i> Guardar cambios
                </button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
