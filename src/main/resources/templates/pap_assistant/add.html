<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SPS - Registro de Asistente PAP</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow border-0">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Nuevo Perfil de Asistente Personal (PAP)</h3>
                </div>
                <div class="card-body p-4">
                    <form action="#" th:action="@{/papassistant/add}" th:object="${papassistant}" method="post">

                        <div class="row">
                            <!-- DNI -->
                            <div class="col-md-4 mb-3">
                                <label for="dni" class="form-label">DNI</label>
                                <input type="text" th:field="*{dni}" class="form-control" id="dni" required />
                            </div>
                            <!-- Nombre -->
                            <div class="col-md-8 mb-3">
                                <label for="name" class="form-label">Nombre Completo</label>
                                <input type="text" th:field="*{name}" class="form-control" id="name" required />
                            </div>
                        </div>

                        <div class="row">
                            <!-- Fecha Nacimiento -->
                            <div class="col-md-4 mb-3">
                                <label for="birthDate" class="form-label">Fecha de Nacimiento</label>
                                <input type="date" th:field="*{birthDate}" class="form-control" id="birthDate" />
                            </div>
                            <!-- Tipo de Asistencia restringido a PAP o PATI -->
                            <div class="col-md-4 mb-3">
                                <label for="assistanceType" class="form-label">Tipo de Asistencia</label>
                                <select th:field="*{assistanceType}" class="form-select" id="assistanceType" required>
                                    <option value="PAP">PAP (Asistente Personal)</option>
                                    <option value="PATI">PATI (Asistente de Transporte)</option>
                                </select>
                                <div class="form-text">Selecciona una de las modalidades válidas.</div>
                            </div>
                            <!-- Experiencia (Boolean) -->
                            <div class="col-md-4 mb-3">
                                <label for="previousExperience" class="form-label">¿Experiencia Previa?</label>
                                <select th:field="*{previousExperience}" class="form-select" id="previousExperience">
                                    <option th:value="true">Sí, tiene experiencia</option>
                                    <option th:value="false">No tiene experiencia</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="professionalTraining" class="form-label">Formación Profesional</label>
                            <input type="text" th:field="*{professionalTraining}" class="form-control" id="professionalTraining" placeholder="Títulos, cursos, certificaciones..." />
                        </div>

                        <div class="row">
                            <!-- Disponibilidad -->
                            <div class="col-md-6 mb-3">
                                <label for="availability" class="form-label">Disponibilidad Horaria</label>
                                <input type="text" th:field="*{availability}" class="form-control" id="availability" placeholder="Ej: Tardes, L-V..." />
                            </div>
                            <!-- Ubicación -->
                            <div class="col-md-6 mb-3">
                                <label for="location" class="form-label">Ubicación / Zona</label>
                                <input type="text" th:field="*{location}" class="form-control" id="location" placeholder="Ciudad o barrio" />
                            </div>
                        </div>

                        <!-- Estado (Status) -->
                        <div class="mb-4">
                            <label for="status" class="form-label">Estado Actual</label>
                            <select th:field="*{status}" class="form-select" id="status">
                                <option value="Accepted">Aceptado</option>
                                <option value="Rejected">Rechazado</option>
                            </select>
                        </div>

                        <hr>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="/papassistant/list" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-success px-4">Registrar Asistente</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
