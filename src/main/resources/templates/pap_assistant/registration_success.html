<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Registro Recibido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #ffffff; color: #000; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .success-card { text-align: center; max-width: 500px; padding: 3rem; background: #f8f9fa; border-radius: 16px; border: 1px solid #e0e0e0; }
        .brand-title { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; }
        .status-badge { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-bottom: 20px; display: inline-block; }
        .btn-home { background: #000; color: #fff; border: none; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: 700; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
<div class="success-card shadow-sm">
    <div class="status-badge">SOLICITUD RECIBIDA</div>
    <h1 class="brand-title">¡Gracias por aplicar!</h1>
    <p>Tu perfil como <strong>Asistente PAP</strong> se ha registrado correctamente.</p>
    <p style="color: #666; font-size: 0.9rem;">Actualmente te encuentras en <strong>proceso de aceptación</strong>. Los administradores de la OVI revisarán tu documentación y recibirás una respuesta a la mayor brevedad posible.</p>

    <a th:href="@{/login}" class="btn-home">Volver al inicio</a>
</div>
</body>
</html>
