<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SPS - Alta de Instructor</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Nuevo Instructor</h3>
                </div>
                <div class="card-body p-4">
                    <form action="#" th:action="@{/instructor/add}" th:object="${instructor}" method="post">

                        <!-- DNI -->
                        <div class="mb-3">
                            <label for="dni" class="form-label">DNI / Identificador</label>
                            <input type="text" th:field="*{dni}" class="form-control" id="dni" placeholder="Ej: 12345678X" required />
                        </div>

                        <!-- Nombre -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Nombre Completo</label>
                            <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Ej: Ana García Pérez" required />
                        </div>

                        <!-- Especialización -->
                        <div class="mb-4">
                            <label for="specialization" class="form-label">Especialización</label>
                            <input type="text" th:field="*{specialization}" class="form-control" id="specialization" placeholder="Ej: Fisioterapia / Deporte Adaptado" />
                        </div>

                        <hr>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="/instructor/list" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-4">Registrar Instructor</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
