<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SPS - Registro de Asistencias</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 th:if="${idActivity == null}">Registro de Asistencias (AssistanceList)</h1>
    <h1 th:if="${idActivity != null}">Asistencias - Actividad <span th:text="${idActivity}"></span></h1>
    <div class="d-flex gap-2">
        <a href="/assistancelist/add" class="btn btn-outline-primary">+ Añadir Asistente</a>
        <a href="/activity/list" class="btn btn-outline-secondary">Ver Actividades</a>
    </div>
</div>

<table class="table table-striped mt-4">
    <thead class="table-info">
    <tr>
        <th>ID</th>
        <th>Fecha Asistencia</th>
        <th>Hora Actividad</th>
        <th>Participacion</th>
        <th>ID Actividad</th>
        <th>DNI Asistente</th>
        <th>DNI OVIUser</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="asistencia : ${assistancesList}">
        <td th:text="${asistencia.id_list}"></td>
        <td th:text="${asistencia.assistanceDate}"></td>
        <td th:text="${asistencia.assistanceTime}"></td>
        <td th:text="${asistencia.participation}"></td>
        <td th:text="${asistencia.idActivity}"></td>
        <td th:text="${asistencia.dniAssistant}"></td>
        <td th:text="${asistencia.dniOVIUser}"></td>
    </tr>
    </tbody>
</table>

<div th:if="${#lists.isEmpty(assistancesList)}" class="alert alert-info mt-4">
    No se han encontrado registros en la tabla <b>assistancelist</b>.
</div>

</body>
</html>
