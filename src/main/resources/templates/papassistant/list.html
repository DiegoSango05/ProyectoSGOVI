<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>SPS - Asistentes PAP</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Asistentes PAP</h1>
  <a href="/activity/list" class="btn btn-outline-dark">Volver a Actividades</a>
</div>

<table class="table table-striped table-hover shadow-sm">
  <thead class="table-warning text-dark">
  <tr>
    <th>DNI</th>
    <th>Nombre</th>
    <th>Email</th>
    <th>Teléfono</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="pap : ${papassistants}">
    <td th:text="${pap.dni}"></td>
    <td th:text="${pap.name}"></td>
    <td th:text="${pap.email}"></td>
    <td th:text="${pap.phoneNumber}"></td>
  </tr>
  </tbody>
</table>

<div th:if="${#lists.isEmpty(papassistants)}" class="alert alert-secondary">
  No hay asistentes PAP registrados.
</div>
</body>
</html>
