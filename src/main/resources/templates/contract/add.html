<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SPS - Formalizar Contrato</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white">
                    <h3 class="mb-0">Nuevo Contrato</h3>
                </div>
                <div class="card-body p-4">
                    <form action="#" th:action="@{/contract/add}" th:object="${contract}" method="post">

                        <div class="row mb-3">
                            <!-- ID Negociación -->
                            <div class="col-md-6">
                                <label for="idNegotiation" class="form-label">ID Negociación Relacionada</label>
                                <input type="number" th:field="*{idNegotiation}" class="form-control" id="idNegotiation" required />
                            </div>
                            <!-- Estado -->
                            <div class="col-md-6">
                                <label for="status" class="form-label">Estado del Contrato</label>
                                <select th:field="*{status}" class="form-select" id="status">
                                    <option value="Pending">Pendiente</option>
                                    <option value="Accepted">Aceptada</option>
                                    <option value="Rejected">Rechazada</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <!-- Fecha Inicio -->
                            <div class="col-md-6">
                                <label for="startDate" class="form-label">Fecha de Inicio</label>
                                <input type="date" th:field="*{startDate}" class="form-control" id="startDate" required />
                            </div>
                            <!-- Fecha Fin -->
                            <div class="col-md-6">
                                <label for="endDate" class="form-label">Fecha de Fin</label>
                                <input type="date" th:field="*{endDate}" class="form-control" id="endDate" />
                            </div>
                        </div>

                        <!-- Documento -->
                        <div class="mb-4">
                            <label for="document" class="form-label">Referencia del Documento (URL/Archivo)</label>
                            <input type="text" th:field="*{document}" class="form-control" id="document" placeholder="Ej: contrato_firmado_v1.pdf" />
                            <div class="form-text">Nombre del documento físico o digital.</div>
                        </div>

                        <hr>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="/contract/list" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-dark px-4">Dar de Alta Contrato</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
