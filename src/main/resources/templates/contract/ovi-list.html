<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Mis contratos</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ovi-orange: #854d00;
            --ovi-orange-dark: #6e4000;
            --ovi-soft: #fffcf5;
        }

        body {
            background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 280px);
            color: #000;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .brand-name {
            color: var(--ovi-orange);
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .page-header {
            border-bottom: 1px solid #eee;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
        }

        .page-title span {
            color: var(--ovi-orange);
        }

        .content-panel {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background-color: var(--ovi-orange);
            border-bottom: 0;
            color: #fff;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .table tbody td {
            color: #333;
            vertical-align: middle;
        }

        .table-striped > tbody > tr:nth-of-type(odd) > * {
            --bs-table-bg-type: #fffaf0;
        }

        .btn-outline-custom {
            border: 2px solid #000;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            padding: 0.58rem 1rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-outline-custom:hover {
            border-color: var(--ovi-orange);
            color: var(--ovi-orange);
        }

        .empty-state {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 3rem 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/oviuser}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span class="brand-name">SgOVI</span>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="page-header d-flex flex-column flex-lg-row justify-content-between gap-3">
        <div>
            <h1 class="page-title">Mis <span>contratos</span></h1>
            <p class="text-muted mb-0">Consulta los contratos asociados a tus solicitudes aceptadas.</p>
        </div>
        <a th:href="@{/oviuser/requests-contracts}" class="btn-outline-custom align-self-start">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>

    <div class="content-panel" th:if="${contracts != null and !contracts.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha inicio</th>
                    <th>Fecha fin</th>
                    <th>Estado</th>
                    <th>Documento</th>
                    <th>Negociacion</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="con : ${contracts}">
                    <td class="fw-semibold" th:text="${con.id}">ID</td>
                    <td th:text="${con.startDate}">Inicio</td>
                    <td th:text="${con.endDate}">Fin</td>
                    <td th:text="${con.status}">Estado</td>
                    <td th:text="${con.document}">Documento</td>
                    <td th:text="${con.idNegotiation}">Negociacion</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="empty-state" th:if="${contracts == null or contracts.isEmpty()}">
        <h2 class="h5 fw-bold mb-2">No tienes contratos asociados</h2>
        <p class="text-muted mb-0">Cuando una solicitud aceptada genere un contrato, aparecera aqui.</p>
    </div>
</main>
</body>
</html>
