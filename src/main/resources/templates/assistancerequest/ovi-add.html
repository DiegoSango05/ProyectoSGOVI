<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Nueva solicitud</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ovi-orange: #da9f38;
            --ovi-orange-dark: #c48b2d;
            --ovi-soft: #fffcf5;
        }

        body {
            background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 280px);
            color: #000;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .brand-name {
            color: var(--ovi-orange);
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .page-header {
            border-bottom: 1px solid #eee;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
        }

        .page-title span {
            color: var(--ovi-orange);
        }

        .form-panel {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-left: 6px solid var(--ovi-orange);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
        }

        .form-label {
            color: #555;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .form-control, .form-select {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0.72rem 0.85rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--ovi-orange);
            box-shadow: 0 0 0 0.2rem rgba(218, 159, 56, 0.18);
        }

        .btn-main {
            background-color: var(--ovi-orange);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            padding: 0.7rem 1.1rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-main:hover {
            background-color: var(--ovi-orange-dark);
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-outline-custom {
            background-color: transparent;
            border: 2px solid #000;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            padding: 0.58rem 1rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-outline-custom:hover {
            border-color: var(--ovi-orange);
            color: var(--ovi-orange);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/oviuser}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span class="brand-name">SgOVI</span>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="page-header d-flex flex-column flex-lg-row justify-content-between gap-3">
        <div>
            <h1 class="page-title">Nueva <span>solicitud</span></h1>
            <p class="text-muted mb-0">Crea una solicitud de asistencia vinculada a tu perfil OVI.</p>
        </div>
        <div class="d-flex gap-2 align-self-start">
            <a th:href="@{/assistancerequest/my-list}" class="btn-outline-custom">Ver mis Solicitudes</a>
            <a th:href="@{/oviuser/index}" class="btn-outline-custom">
                <i class="bi bi-arrow-left me-1"></i> Volver al Inicio
            </a>
        </div>
    </div>

    <section class="form-panel">
        <form action="#" th:action="@{/assistancerequest/ovi-add}" th:object="${assistancerequest}" method="post">

                <div class="col-md-6">
                    <label for="type" class="form-label">Tipo de asistencia</label>
                    <select th:field="*{type}" class="form-select" id="type" required>
                        <option value="" disabled selected hidden>Seleccionar opción...</option>
                        <option value="PAP">PAP</option>
                        <option value="PATI">PATI</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="requirements" class="form-label">Requerimientos especiales</label>
                    <input type="text" th:field="*{requirements}" class="form-control" id="requirements" placeholder="Ej: Apoyo visual y guia" />
                </div>

                <div class="col-md-6">
                    <label for="schedule" class="form-label">Disponibilidad requerida:</label>
                    <select th:field="*{schedule}" class="form-select" id="schedule" required>
                        <option value="" disabled selected hidden>Seleccionar opción...</option>
                        <option value="Mañanas">Mañanas</option>
                        <option value="Tardes">Tardes</option>
                        <option value="Noches">Noches</option>
                        <option value="Fines de semana">Fines de semana</option>
                    </select>
                </div>

                        <option value="Viver">Viver</option>
                        <option value="Zorita del Maestrazgo">Zorita del Maestrazgo</option>
                        <option value="Zucaina">Zucaina</option>
                    </select>
                </div>

                <div class="col-12">
                    <label for="description" class="form-label">Detalles exactos (Ej: Lunes a las 16:00 en la UJI):</label>
                    <textarea th:field="*{description}" class="form-control" id="description" rows="3" required></textarea>
                </div>

            </div>

            <div class="border-top mt-4 pt-4 d-flex flex-column flex-md-row justify-content-end gap-2">
                <a th:href="@{/assistancerequest/my-list}" class="btn-outline-custom">
                    Cancelar
                </a>
                <button type="submit" class="btn-main">
                    <i class="bi bi-check2 me-1"></i> Guardar solicitud
                </button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
