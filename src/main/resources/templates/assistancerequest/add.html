<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SPS - Nueva Solicitud de Asistencia</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Crear Solicitud de Asistencia</h3>
                </div>
                <div class="card-body p-4">
                    <form action="#" th:action="@{/assistancerequest/add}" th:object="${assistancerequest}" method="post">

                        <div class="row">
                            <!-- Tipo de asistencia -->
                            <div class="col-md-6 mb-3">
                                <label for="type" class="form-label">Tipo de Asistencia</label>
                                <input type="text" th:field="*{type}" class="form-control" id="type" placeholder="Ej: PAP/PATI" required />
                            </div>
                            <!-- Estado (Status) -->
                            <div class="col-md-6 mb-3">
                                <label for="status" class="form-label">Estado</label>
                                <select th:field="*{status}" class="form-select" id="status">
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="En Proceso">En Proceso</option>
                                    <option value="Completada">Completada</option>
                                </select>
                            </div>
                        </div>

                        <!-- Descripción -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Descripción Detallada</label>
                            <textarea th:field="*{description}" class="form-control" id="description" rows="2" required></textarea>
                        </div>

                        <div class="row">
                            <!-- Horario (Schedule) -->
                            <div class="col-md-6 mb-3">
                                <label for="schedule" class="form-label">Horario / Tiempo</label>
                                <input type="text" th:field="*{schedule}" class="form-control" id="schedule" placeholder="Ej: Lunes 10:00-12:00" />
                            </div>
                            <!-- Ubicación -->
                            <div class="col-md-6 mb-3">
                                <label for="location" class="form-label">Ubicación</label>
                                <input type="text" th:field="*{location}" class="form-control" id="location" />
                            </div>
                        </div>

                        <!-- Requerimientos -->
                        <div class="mb-3">
                            <label for="requirements" class="form-label">Requerimientos Especiales</label>
                            <input type="text" th:field="*{requirements}" class="form-control" id="requirements" placeholder="Ej: Apoyo visual y guía" />
                        </div>

                        <!-- DNI Usuario OVI -->
                        <div class="mb-3">
                            <label for="dniOVIuser" class="form-label">DNI Usuario OVI</label>
                            <input type="text" th:field="*{dniOVIuser}" class="form-control" id="dniOVIuser" required />
                        </div>

                        <hr class="my-4">

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/assistancerequest/list" class="btn btn-outline-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-4">Guardar Solicitud</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
