<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Candidatos Propuestos</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --ovi-orange: #854d00; --ovi-soft: #fffcf5; }
        body { background-color: var(--ovi-soft); font-family: 'Inter', sans-serif; }
        .candidate-card {
            background: white;
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .candidate-card:hover { transform: translateY(-5px); }
        .btn-select {
            background-color: var(--ovi-orange);
            color: white;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
        }
        .badge-info { background-color: #e9ecef; color: #495057; font-size: 0.8rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/assistancerequest/my-list}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo" style="max-width: 50px;">
        </a>
        <a th:href="@{/assistancerequest/my-list}" class="btn btn-outline-dark">VOLVER</a>
    </div>
</nav>

<main class="container py-5">
    <div class="mb-5">
        <h1 class="fw-bold">Candidatos para <span class="text-warning" th:text="${request.type}">Servicio</span></h1>
        <p class="text-muted">Estos son los asistentes que mejor encajan con tu solicitud en <span th:text="${request.location}">Castellón</span>.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="candidate : ${candidates}">
            <div class="candidate-card p-4 h-100 d-flex flex-column">
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-light rounded-circle p-3 me-3">
                        <i class="bi bi-person-fill fs-2 text-secondary"></i>
                    </div>
                    <div>
                        <h3 class="h5 fw-bold mb-0" th:text="${candidate.name}">Nombre</h3>
                        <small class="text-muted" th:text="${candidate.location}">Ubicación</small>
                    </div>
                </div>

                <div class="mb-3 flex-grow-1">
                    <div class="mb-2">
                        <span class="badge badge-info me-1" th:text="${candidate.professionalTraining}">Formación</span>
                        <span class="badge bg-success text-white" th:if="${candidate.previousExperience}">Con experiencia</span>
                    </div>
                    <p class="small text-muted">
                        <i class="bi bi-clock me-1"></i> Disponible: <span th:text="${candidate.availability}">Horario</span>
                    </p>
                </div>

                <form th:action="@{/negotiation/start}" method="post">
                    <input type="hidden" name="idRequest" th:value="${request.id}">
                    <input type="hidden" name="dniAssistant" th:value="${candidate.dni}">
                    <button type="submit" class="btn btn-select py-2">
                        SELECCIONAR Y CONTACTAR
                    </button>
                </form>
            </div>
        </div>

        <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(candidates)}">
            <i class="bi bi-emoji-frown fs-1 text-muted"></i>
            <p class="mt-3 text-muted">Aún no se han asignado candidatos específicos. Contacta con soporte.</p>
        </div>
    </div>
</main>
</body>
</html>
