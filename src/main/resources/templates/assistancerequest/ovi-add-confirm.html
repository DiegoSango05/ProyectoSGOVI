<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Solicitud Creada</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>

        :root {
            --ovi-orange: #854d00;
            --ovi-orange-dark: #6e4000;
            --ovi-soft: #fffcf5;
            --status-pending: #da9f38;
        }
        body { background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 280px); color: #000; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .brand-name { color: var(--ovi-orange); font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; }
        .form-panel { background-color: #fcfcfc; border: 1px solid #eee; border-left: 6px solid #198754; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); padding: 2rem; text-align: center; }
        .btn-main { background-color: var(--ovi-orange); border: none; border-radius: 8px; color: #fff; font-weight: 700; padding: 0.7rem 1.1rem; text-decoration: none; text-transform: uppercase; transition: 0.2s; }
        .btn-main:hover { background-color: var(--ovi-orange-dark); color: #fff; transform: translateY(-1px); }
        .detail-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 0.8rem 0; text-align: left; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #777; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; }
        .status-badge { background-color: var(--status-pending); color: white; padding: 0.3rem 0.8rem; border-radius: 999px; font-weight: bold; font-size: 0.85rem;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/oviuser}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span class="brand-name">SgOVI</span>
        </div>
    </div>
</nav>

<main class="container py-5 d-flex justify-content-center">
    <div class="col-md-8 col-lg-6">
        <section class="form-panel">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            <h1 class="h3 fw-bold mt-3 mb-2">¡Solicitud Creada con Éxito!</h1>
            <p class="text-muted mb-4">Tu petición ha sido registrada y está a la espera de ser revisada por un administrador de la OVI.</p>

            <div class="bg-white border rounded-3 p-4 mb-4">
                <div class="detail-row">
                    <span class="detail-label">Tipo de asistencia</span>
                    <span class="fw-bold" th:text="${savedRequest.type}">PAP</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Localidad</span>
                    <span th:text="${savedRequest.location}">Castellón</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Disponibilidad</span>
                    <span th:text="${savedRequest.schedule}">Mañanas</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Estado Actual</span>
                    <span class="status-badge">PENDIENTE</span>
                </div>
            </div>

            <a th:href="@{/assistancerequest/my-list}" class="btn-main d-inline-block w-100">
                <i class="bi bi-list-ul me-2"></i>Ir a mis solicitudes
            </a>
        </section>
    </div>
</main>
</body>
</html>
