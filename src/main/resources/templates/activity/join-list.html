<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Apuntarse a actividad</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ovi-orange: #da9f38;
            --ovi-orange-dark: #c48b2d;
            --ovi-soft: #fffcf5;
        }

        body {
            background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 280px);
            color: #000;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .brand-name {
            color: var(--ovi-orange);
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .page-header {
            border-bottom: 1px solid #eee;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
        }

        .page-title span {
            color: var(--ovi-orange);
        }

        .btn-main {
            background-color: var(--ovi-orange);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            padding: 0.7rem 1.1rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-main:hover {
            background-color: var(--ovi-orange-dark);
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-outline-custom {
            background-color: transparent;
            border: 2px solid #000;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            padding: 0.58rem 1rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-outline-custom:hover {
            border-color: var(--ovi-orange);
            color: var(--ovi-orange);
        }

        .activity-card {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-left: 6px solid var(--ovi-orange);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            height: 100%;
            padding: 1.5rem;
        }

        .activity-card h2 {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 0.35rem;
        }

        .detail-label {
            color: #777;
            display: block;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .type-pill {
            background-color: rgba(218, 159, 56, 0.16);
            border-radius: 999px;
            color: #8b641f;
            display: inline-flex;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 0.38rem 0.75rem;
            text-transform: uppercase;
        }

        .registered-pill {
            background-color: #198754;
            border-radius: 999px;
            color: #fff;
            display: inline-flex;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 0.42rem 0.8rem;
            text-transform: uppercase;
        }

        .empty-state {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 3rem 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/oviuser}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span class="brand-name">SgOVI</span>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="page-header d-flex flex-column flex-lg-row justify-content-between gap-3">
        <div>
            <h1 class="page-title">Apuntarse a <span>actividad</span></h1>
            <p class="text-muted mb-0">Elige una actividad disponible en la base de datos.</p>
        </div>
        <a th:href="@{/activity/my-list}" class="btn-outline-custom align-self-start">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>

    <div class="row g-4" th:if="${activities != null and !activities.isEmpty()}">
        <div class="col-lg-6" th:each="activity : ${activities}">
            <article class="activity-card">
                <div class="d-flex justify-content-between gap-3 mb-3">
                    <div>
                        <span class="detail-label">Actividad</span>
                        <h2 th:text="${activity.title}">Titulo</h2>
                    </div>
                    <span class="type-pill" th:text="${activity.type}">Tipo</span>
                </div>

                <p class="text-muted" th:text="${activity.description}">Descripcion</p>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <span class="detail-label">Fecha</span>
                        <span th:text="${activity.activityDate}">Fecha</span>
                    </div>
                    <div class="col-md-6">
                        <span class="detail-label">Hora</span>
                        <span th:text="${activity.activityTime}">Hora</span>
                    </div>
                    <div class="col-md-6">
                        <span class="detail-label">Lugar</span>
                        <span th:text="${activity.location}">Lugar</span>
                    </div>
                    <div class="col-md-6">
                        <span class="detail-label">Plazas maximas</span>
                        <span th:text="${activity.maxParticipants}">0</span>
                    </div>
                </div>

                <form th:if="${registeredByActivityId[activity.id] == false}"
                      th:action="@{/activity/join/{id}(id=${activity.id})}"
                      method="post">
                    <button type="submit" class="btn-main">
                        <i class="bi bi-person-plus me-1"></i> Apuntarme
                    </button>
                </form>
                <span th:if="${registeredByActivityId[activity.id]}" class="registered-pill">
                    Ya inscrito
                </span>
            </article>
        </div>
    </div>

    <div class="empty-state" th:if="${activities == null or activities.isEmpty()}">
        <h2 class="h5 fw-bold mb-2">No hay actividades disponibles</h2>
        <p class="text-muted mb-0">Cuando se registren actividades en la base de datos, apareceran aqui.</p>
    </div>
</main>
</body>
</html>
