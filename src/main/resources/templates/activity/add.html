<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SgOVI - Nueva Actividad</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --ovi-orange: #854d00;
            --ovi-orange-dark: #6e4000;
            --ovi-soft: #fffcf5;
        }

        body {
            background: linear-gradient(to bottom, var(--ovi-soft), #ffffff 300px);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        .brand-name { color: var(--ovi-orange); font-weight: 800; letter-spacing: 2px; }
        .btn-outline-custom-nav {
            border: 2px solid #000;
            border-radius: 8px;
            padding: 0.5rem 1.5rem;
            text-decoration: none;
            color: #000;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn-outline-custom-nav:hover {
            border-color: var(--ovi-orange) !important;
            color: var(--ovi-orange) !important;
            background-color: transparent !important;
        }

        .form-container {
            max-width: 850px;
            margin: 40px auto 0;
            background-color: #fcfcfc;
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid #eee;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .form-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--ovi-orange);
            display: inline-block;
            margin-bottom: 25px;
            padding-bottom: 5px;
            color: var(--ovi-orange);
        }
        .form-label { font-size: 0.8rem; font-weight: 700; color: #444; text-transform: uppercase; margin-bottom: 8px; }
        .form-control, .form-select {
            background-color: #ffffff;
            border: 1px solid var(--ovi-orange);
            color: #000;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        /* Estilo especial para el input group del tipo */
        .input-group .form-control { border-right: none; }
        .input-group .btn-refresh {
            border: 1px solid var(--ovi-orange);
            background: white;
            color: var(--ovi-orange);
            border-left: none;
            border-radius: 0 8px 8px 0;
        }
        .input-group .btn-refresh:hover { background: var(--ovi-soft); color: var(--ovi-orange-dark); }

        .btn-save {
            background-color: var(--ovi-orange);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-save:hover { background-color: var(--ovi-orange-dark); transform: translateY(-1px); }
        .btn-cancel { color: #666; text-decoration: underline; font-weight: 600; padding: 12px 20px; font-size: 0.9rem; }
        .error-text { color: #dc3545; font-size: 0.8rem; margin-top: 5px; font-weight: 600; }
        .help-text { font-size: 0.72rem; color: #888; font-style: italic; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg pt-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/index}">
            <img th:src="@{'/img/Logo SGOvi.png'}" alt="Logo OVI" style="max-width: 60px;">
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="brand-name">SgOVI</span>
            <a th:href="@{/activity/list}" class="btn-outline-custom-nav">VOLVER AL LISTADO</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-container">
        <h2 class="form-section-title">Registro de Nueva Actividad</h2>

        <form th:action="@{/activity/add}" th:object="${activity}" method="post">

            <div class="row">
                <div class="col-md-8 mb-4">
                    <label for="title" class="form-label">Título de la Actividad</label>
                    <input type="text" th:field="*{title}" class="form-control" id="title" placeholder="Ej: Taller de Autonomía" />
                    <div class="error-text" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>
                <div class="col-md-4 mb-4">
                    <label for="type" class="form-label">Tipo / Especialidad</label>
                    <div class="input-group">
                        <input type="text" th:field="*{type}" class="form-control" id="type" placeholder="Ej: Cocina" />
                        <button type="button" class="btn btn-refresh"
                                onclick="const t = document.getElementById('type').value; if(t) window.location.href='/activity/add?type='+encodeURIComponent(t);">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>
                    <span class="help-text">Pulsa el icono para buscar especialistas.</span>
                </div>
            </div>

            <div class="mb-4">
                <label for="dniInstructor" class="form-label">Instructor Responsable</label>
                <select th:field="*{dniInstructor}" id="dniInstructor" class="form-select">
                    <option value="">Selecciona un instructor...</option>
                    <option th:each="inst : ${instructors}"
                            th:value="${inst.dni}"
                            th:text="${inst.specialization == activity.type and activity.type != '' ? '⭐ ' + inst.name + ' (Especialista)' : inst.name}">
                    </option>
                </select>
                <div class="error-text" th:if="${#fields.hasErrors('dniInstructor')}" th:errors="*{dniInstructor}"></div>
                <div class="form-text small mt-1">
                    <i class="bi bi-star-fill text-warning"></i> Los especialistas sugeridos aparecen con una estrella.
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label for="activityDate" class="form-label">Fecha</label>
                    <input type="date" th:field="*{activityDate}" class="form-control" id="activityDate" />
                    <div class="error-text" th:if="${#fields.hasErrors('activityDate')}" th:errors="*{activityDate}"></div>
                </div>
                <div class="col-md-6 mb-4">
                    <label for="activityTime" class="form-label">Hora de Inicio</label>
                    <input type="time" th:field="*{activityTime}" class="form-control" id="activityTime" />
                </div>
            </div>

            <div class="row">
                <div class="col-md-8 mb-4">
                    <label for="location" class="form-label">Ubicación / Lugar</label>
                    <input type="text" th:field="*{location}" class="form-control" id="location" placeholder="Centro Social..." />
                    <div class="error-text" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                </div>
                <div class="col-md-4 mb-4">
                    <label for="maxParticipants" class="form-label">Máx. Participantes</label>
                    <input type="number" th:field="*{maxParticipants}" class="form-control" id="maxParticipants" min="1" />
                </div>
            </div>

            <div class="mb-5">
                <label for="description" class="form-label">Descripción del Evento</label>
                <textarea th:field="*{description}" class="form-control" id="description" rows="3"></textarea>
            </div>

            <div class="d-flex justify-content-end align-items-center border-top pt-4">
                <a th:href="@{/activity/list}" class="btn-cancel me-3">Cancelar</a>
                <button type="submit" class="btn-save shadow-sm">Crear Actividad</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
