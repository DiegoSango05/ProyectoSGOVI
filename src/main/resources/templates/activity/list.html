<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Actividades</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Lista de Actividades</h1>
    <a href="/activity/add" class="btn btn-outline-primary">+ Nueva Actividad</a>
    <a href="/" class="btn btn-outline-primary">Volver al Inicio</a>
</div>
<table class="table table-striped mt-4">
    <thead class="table-info">
    <tr>
        <th>ID</th>
        <th>Descripción</th>
        <th>Título</th>
        <th>Tipo</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Ubicación</th>
        <th>DNI Instructor</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="activity : ${activities}">
        <td th:text="${activity.id}"></td>
        <td th:text="${activity.description}"></td>
        <td th:text="${activity.title}"></td>
        <td th:text="${activity.type}"></td>
        <td th:text="${activity.activityDate}"></td>
        <td th:text="${activity.activityTime}"></td>
        <td th:text="${activity.location}"></td>
        <td th:text="${activity.dniInstructor}"></td>
        <td><a th:href="@{/assistancelist/list(idActivity=${activity.id})}" class="btn btn-sm btn-outline-primary">Ver lista asistencia</a></td>
    </tr>
    </tbody>
</table>
<div th:if="${activities.isEmpty()}">
    <p class="alert alert-warning">No hay actividades registradas en la base de datos.</p>
</div>
</body>
</html>
